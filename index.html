<!DOCTYPE html>
<html>
<head>
  <title>My First CI/CD App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 50px 60px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.3);
      border: 1px solid rgba(99, 102, 241, 0.6);
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.05rem;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .tags {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tag {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.75);
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">DSO101 — Assignment IV</div>
    <h1>Hello DevOps!</h1>
    <p>
      <span class="dot"></span> Deployed with GitHub Actions & Render
    </p>
    <div class="tags">
      <span class="tag">🔧 GitHub Actions</span>
      <span class="tag">🚀 Render</span>
      <span class="tag">⚙️ CI/CD</span>
    </div>
  </div>
</body>
</html>
